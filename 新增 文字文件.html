<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台灣妖怪抓抓樂 - M100洋紅背景圖(B.jpg)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            /* 背景圖片：B.jpg，完整覆蓋不重複，置中，固定 */
            background: url('B.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-container {
            width: 100%;
            max-width: 550px;
            background: rgba(193, 0, 109, 0.35);
            border-radius: 56px;
            backdrop-filter: blur(4px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            padding: 16px 12px 20px;
        }

        .status-bar {
            background: #6b1a4ecc;
            border-radius: 60px;
            padding: 12px 18px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: #fff0f5;
            text-shadow: 0 1px 2px black;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .catch-count {
            background: #f7b05e;
            color: #2d2b1f;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 1.2rem;
        }

        .game-area {
            background: #e07bb0aa;
            background-image: radial-gradient(circle at 25% 40%, rgba(255, 180, 220, 0.35) 2%, transparent 2.5%);
            background-size: 32px 32px;
            min-height: 380px;
            border-radius: 48px;
            position: relative;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 3px #ffc0e0, inset 0 0 0 8px #b14e8a, 0 8px 20px black;
            overflow: hidden;
            touch-action: manipulation;
        }

        .monster-btn {
            position: absolute;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            background: #fff6e8;
            box-shadow: 0 7px 0 #7a4d2e;
            transition: transform 0.05s linear, box-shadow 0.1s;
            touch-action: manipulation;
            will-change: transform;
            overflow: hidden;
            padding: 0;
        }
        .monster-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #7a4d2e;
        }
        .monster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        .monster-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff9e8;
            font-size: 0.7rem;
            font-weight: bold;
            text-align: center;
            padding: 5px 0;
            backdrop-filter: blur(3px);
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            border-radius: 0 0 44px 44px;
        }
        .monster-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #f0e2ce;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }
        .btn {
            background: #fbd26a;
            border: none;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            width: 30%;
            box-shadow: 0 5px 0 #a05e15;
            transition: 0.05s linear;
            text-align: center;
            color: #2f2418;
            cursor: pointer;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a05e15;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #fff9ef;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            border-radius: 48px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 20px 40px black;
            border: 2px solid #ffcf8a;
        }
        .modal-card h2 {
            text-align: center;
            color: #4f2d1a;
            margin-top: 0;
        }
        .pokedex-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 18px;
            margin: 20px 0;
            max-height: 55vh;
            overflow-y: auto;
            padding: 8px;
        }
        .pokedex-card {
            background: #fdf8ed;
            border-radius: 24px;
            box-shadow: 0 6px 0 #b98f5c;
            text-align: center;
            padding: 16px 8px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            border: 2px solid #ebc28e;
        }
        .pokedex-card:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b98f5c;
        }
        .pokedex-card.uncaught {
            opacity: 0.8;
            filter: grayscale(0.1);
            background: #dacaa4;
            border-color: #a07d4e;
        }
        .pokedex-avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
            background: #e6d5b3;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px #c7aa7a, 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .pokedex-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #f3e9cf;
            pointer-events: auto;
        }
        .question-mark {
            font-size: 3.2rem;
            font-weight: bold;
            color: #5e3a1f;
        }
        .pokedex-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: #3b2a1f;
            margin-top: 6px;
            white-space: nowrap;
            overflow-x: auto;
        }
        .undiscovered-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #5e3a1f;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .close-modal {
            background: #ac7349;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 12px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #ffe0f0;
            margin-top: 20px;
            text-shadow: 0 1px 2px #4a002a;
        }
        @media (max-width: 500px) {
            .monster-btn {
                width: 78px;
                height: 78px;
            }
            .pokedex-avatar {
                width: 85px;
                height: 85px;
            }
            .question-mark {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="status-bar">
        <span>📖 台灣妖怪大師</span>
        <span class="catch-count">🐾 圖鑑收集: <span id="catchNumber">0</span></span>
    </div>
    <div id="gameArea" class="game-area"></div>
    <div class="action-buttons">
        <button class="btn" id="openPokedexBtn">📕 圖鑑</button>
        <button class="btn" id="resetBtn">🔄 重置</button>
        <button class="btn" id="igBtn">📷 IG</button>
    </div>
    <footer>✨ 每次捕捉都有黃色閃光 ✨ 圖鑑總覽點圖片進詳情，詳情頁內點圖片可放大</footer>
</div>

<div id="pokedexModal" class="modal">
    <div class="modal-card">
        <h2>✨ 台灣妖怪圖鑑 ✨</h2>
        <div id="pokedexList" class="pokedex-list">載入中...</div>
        <button class="close-modal" id="closeModalBtn">關閉圖鑑</button>
    </div>
</div>

<script>
    const MONSTERS = [
        { id: "1", name: "紅衣小女孩", emoji: "👻", desc: "台灣最知名的都市傳說與鄉野妖怪之一，通常被描述為一個身穿紅色童裝的小女孩，會突然出現在山區或監視器畫面中，被認為是山精鬼魅或「魔神仔」的一種。" },
        { id: "2", name: "人面魚", emoji: "🐟", desc: "最早源於1990年代一則口耳相傳的靈異故事，描述一名釣客捕獲的吳郭魚身上浮現老婦人臉孔，並以台語說出「魚肉好吃嗎」等話語。" },
        { id: "3", name: "油蹄貓", emoji: "🐱", desc: "油蹄貓會一種特殊的魔法，當牠跳躍過死者的身體時，死者會起死回生。" },
        { id: "4", name: "山藥怪人", emoji: "👹", desc: "擁有一對翅膀會飛翔的神奇山藥，怕被吃掉。" },
        { id: "5", name: "婆娑鳥", emoji: "🦜", desc: "公鳥華麗，母鳥素雅。他們是森林中的歌姬，有讓所有動物為之稱服的甜美歌聲。" },
        { id: "6", name: "貓鬼", emoji: "🐈", desc: "貪吃鬼小貓咪，看到小孩肥美的臉頰走不動路，直到品嘗到麻油雞。" },
        { id: "7", name: "鹿兔", emoji: "🐰", desc: "從前兔子的頭上都有長角，直到鹿將兔角借走，兔兔的頭上再也不長角了。" },
        { id: "8", name: "兩腳魚", emoji: "🐠", desc: "因為太勤奮把報恩對象養成小廢物的肌肉猛魚。" },
        { id: "9", name: "西瓜鬼", emoji: "🍉", desc: "西瓜鬼，是台灣傳說中的鬼怪，會變成西瓜以捉弄他人。" },
        { id: "10", name: "鯰魚精", emoji: "🐋", desc: "覺得池子太小，招雨導致淹大水滅村，最後被三山國王嚴懲。" },
        { id: "11", name: "貍女", emoji: "🦡", desc: "會變成美少女害男村民忘記回家的小果子狸。" },
        { id: "12", name: "白犬", emoji: "🐶", desc: "達魯瑪克的守護獸，當部落搬家時，白犬不肯一直汪汪叫，結果部落村民因為瘧疾去世，之後族人將白犬叫的地方稱作「達洛卡可屯」。" },
        { id: "13", name: "虎姑婆", emoji: "🐯", desc: "山中的老虎精化身為老婆婆，誘騙小孩開門，據說最怕熱水澡。" },
        { id: "14", name: "雲龍", emoji: "🌪️", desc: "在台灣南方的傀儡山上，住著一條墨黑色的雲龍。牠最愛在雲層間穿梭，只要牠一出現，就會帶來大雨。" },
        { id: "15", name: "宮燈姊姊", emoji: "👧", desc: "淡江大學校園內著名的女鬼傳說，相傳她穿著日治時期或復古學生制服，常在夜間提著宮燈現身於校園的宮燈道上，等待或詢問男學生「幾點了」。" },
        { id: "16", name: "大明蛇神", emoji: "🐍", desc: "台灣台北市北投不動明王寺旁的瀑布兩側所供奉的「大蛇明神」，傳說源自日治時期危害地方的蛇妖被不動明王鎮伏後昇格為神明。" },
        { id: "17", name: "幽靈巴士", emoji: "🚐", desc: "陽明山的仰德大道上有一台半夜還在載人的260公車，傳說那是給好兄弟坐的公車。" },
        { id: "18", name: "雪山魔女", emoji: "🟣", desc: "據說在雪山山上有個女鬼會把登山的人誘導進深山山林裡失蹤，通常出現在雪山的黑森林中。" },
        { id: "19", name: "陳守娘", emoji: "👩‍🦰", desc: "台灣最強女鬼，生前被欺負，死後化做怨靈因靈力太強導致台南大亂，土地公來勸她，被她趕跑。連廣澤尊王來了，紅光和青光在天上打了很久，最終被菩薩感化。" },
        { id: "20", name: "大腳仙", emoji: "👟", desc: "屏東縣潮州鎮大腳仙林以其命名，後來傳說變成有一雙大腳的巨人許大砲。" }
    ];

    for (let monster of MONSTERS) {
        monster.image = `${monster.id}.png`;
    }

    let catchCounts = {};
    let currentMonsters = [];
    let spawnInterval = null;

    const gameArea = document.getElementById("gameArea");
    const catchNumberSpan = document.getElementById("catchNumber");
    const openPokedexBtn = document.getElementById("openPokedexBtn");
    const resetBtn = document.getElementById("resetBtn");
    const igBtn = document.getElementById("igBtn");
    const modal = document.getElementById("pokedexModal");
    const pokedexListDiv = document.getElementById("pokedexList");
    const closeModalBtn = document.getElementById("closeModalBtn");

    function getCollectedSpeciesCount() {
        let count = 0;
        for (let monster of MONSTERS) {
            if (catchCounts[monster.id] && catchCounts[monster.id] > 0) count++;
        }
        return count;
    }

    function updateCatchCountUI() {
        catchNumberSpan.innerText = getCollectedSpeciesCount();
    }

    function saveProgress() {
        localStorage.setItem("taiwanMonsterCatchCounts", JSON.stringify(catchCounts));
    }

    function loadProgress() {
        const saved = localStorage.getItem("taiwanMonsterCatchCounts");
        if (saved) {
            catchCounts = JSON.parse(saved);
        } else {
            catchCounts = {};
            for (let monster of MONSTERS) {
                catchCounts[monster.id] = 0;
            }
        }
        for (let monster of MONSTERS) {
            if (catchCounts[monster.id] === undefined) catchCounts[monster.id] = 0;
        }
        updateCatchCountUI();
    }

    function removeMonsterElement(element) {
        if (element && element.parentNode) element.remove();
        const index = currentMonsters.findIndex(m => m.element === element);
        if (index !== -1) currentMonsters.splice(index, 1);
    }

    function showFlashEffect(clientX, clientY) {
        const flash = document.createElement("div");
        flash.style.position = "fixed";
        flash.style.left = (clientX - 50) + "px";
        flash.style.top = (clientY - 50) + "px";
        flash.style.width = "100px";
        flash.style.height = "100px";
        flash.style.borderRadius = "50%";
        flash.style.backgroundColor = "rgba(255, 215, 0, 0.9)";
        flash.style.boxShadow = "0 0 30px 15px gold";
        flash.style.pointerEvents = "none";
        flash.style.zIndex = "9999";
        flash.style.opacity = "0.9";
        flash.style.transform = "scale(0.5)";
        flash.style.transition = "all 0.4s ease-out";
        document.body.appendChild(flash);
        requestAnimationFrame(() => {
            flash.style.transform = "scale(1.8)";
            flash.style.opacity = "0";
        });
        setTimeout(() => {
            if (flash.parentNode) flash.remove();
        }, 450);
    }

    function showZoomModal(imageUrl) {
        const zoomDiv = document.createElement("div");
        zoomDiv.style.position = "fixed";
        zoomDiv.style.top = "0";
        zoomDiv.style.left = "0";
        zoomDiv.style.width = "100%";
        zoomDiv.style.height = "100%";
        zoomDiv.style.backgroundColor = "rgba(0,0,0,0.92)";
        zoomDiv.style.backdropFilter = "blur(15px)";
        zoomDiv.style.zIndex = "4000";
        zoomDiv.style.display = "flex";
        zoomDiv.style.alignItems = "center";
        zoomDiv.style.justifyContent = "center";
        zoomDiv.style.flexDirection = "column";
        
        const backBtn = document.createElement("div");
        backBtn.innerHTML = "←";
        backBtn.style.position = "absolute";
        backBtn.style.top = "30px";
        backBtn.style.left = "20px";
        backBtn.style.fontSize = "2.5rem";
        backBtn.style.color = "white";
        backBtn.style.fontWeight = "bold";
        backBtn.style.textShadow = "0 0 5px black";
        backBtn.style.cursor = "pointer";
        backBtn.style.zIndex = "4001";
        backBtn.style.width = "50px";
        backBtn.style.height = "50px";
        backBtn.style.display = "flex";
        backBtn.style.alignItems = "center";
        backBtn.style.justifyContent = "center";
        backBtn.style.backgroundColor = "rgba(0,0,0,0.5)";
        backBtn.style.borderRadius = "50%";
        backBtn.style.backdropFilter = "blur(4px)";
        backBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            zoomDiv.remove();
        });
        
        const img = document.createElement("img");
        img.src = imageUrl;
        img.style.maxWidth = "90vw";
        img.style.maxHeight = "90vh";
        img.style.objectFit = "contain";
        img.style.borderRadius = "16px";
        img.style.boxShadow = "0 10px 30px rgba(0,0,0,0.5)";
        img.style.border = "2px solid #ffcf8a";
        
        zoomDiv.appendChild(backBtn);
        zoomDiv.appendChild(img);
        document.body.appendChild(zoomDiv);
        
        zoomDiv.addEventListener("click", (e) => {
            if (e.target === zoomDiv) zoomDiv.remove();
        });
    }

    function showFirstCatchModal(monster, onClose) {
        const modalDiv = document.createElement("div");
        modalDiv.style.position = "fixed";
        modalDiv.style.top = "0";
        modalDiv.style.left = "0";
        modalDiv.style.width = "100%";
        modalDiv.style.height = "100%";
        modalDiv.style.backgroundColor = "rgba(0,0,0,0.85)";
        modalDiv.style.display = "flex";
        modalDiv.style.alignItems = "center";
        modalDiv.style.justifyContent = "center";
        modalDiv.style.zIndex = "2000";
        modalDiv.style.backdropFilter = "blur(8px)";
        const card = document.createElement("div");
        card.style.backgroundColor = "#fff6e8";
        card.style.borderRadius = "56px";
        card.style.maxWidth = "340px";
        card.style.width = "80%";
        card.style.padding = "24px 20px 28px";
        card.style.textAlign = "center";
        card.innerHTML = `
            <div style="width:130px; height:130px; margin:0 auto 12px; background:#f3e5c9; display:flex; align-items:center; justify-content:center; border-radius:16px; padding:10px; cursor:pointer;" id="firstCatchImg">
                <img src="${monster.image}" style="max-width:100%; max-height:100%; object-fit:contain;">
            </div>
            <h3 style="color:#4f2d1a; margin:8px 0 12px;">✨ 初次捕獲 ${monster.name} ✨</h3>
            <p style="background:#f8efdb; border-radius:32px; padding:14px; line-height:1.45;">${monster.desc}</p>
            <div style="margin: 12px 0 0; font-size:1rem; color:#7a4d2e;">📊 目前累計捕捉次數：1</div>
            <button id="continueBtn" style="background:#ac7349; border:none; color:white; padding:10px 24px; border-radius:40px; font-size:1rem; margin-top:18px; cursor:pointer;">繼續捕捉</button>
        `;
        modalDiv.appendChild(card);
        document.body.appendChild(modalDiv);
        
        const imgContainer = card.querySelector("#firstCatchImg");
        imgContainer.addEventListener("click", (e) => {
            e.stopPropagation();
            showZoomModal(monster.image);
        });
        
        const continueBtn = card.querySelector("#continueBtn");
        const closeHandler = () => {
            modalDiv.remove();
            if (onClose) onClose();
        };
        continueBtn.addEventListener("click", closeHandler);
        modalDiv.addEventListener("click", (e) => { if (e.target === modalDiv) closeHandler(); });
    }

    function catchMonster(monsterId, monsterData, element, clickEvent) {
        const currentCount = catchCounts[monsterId] || 0;
        const isFirstCatch = (currentCount === 0);
        
        let flashX, flashY;
        if (clickEvent) {
            flashX = clickEvent.clientX;
            flashY = clickEvent.clientY;
        } else {
            const rect = element.getBoundingClientRect();
            flashX = rect.left + rect.width / 2;
            flashY = rect.top + rect.height / 2;
        }
        showFlashEffect(flashX, flashY);
        
        catchCounts[monsterId] = currentCount + 1;
        saveProgress();
        updateCatchCountUI();
        removeMonsterElement(element);
        
        if (isFirstCatch) {
            setTimeout(() => {
                showFirstCatchModal(monsterData, () => {});
            }, 200);
        }
    }

    function spawnRandomMonster() {
        if (!gameArea) return;
        if (currentMonsters.length >= 18) return;
        const monster = MONSTERS[Math.floor(Math.random() * MONSTERS.length)];
        const maxX = Math.max(70, gameArea.clientWidth - 100);
        const maxY = Math.max(70, gameArea.clientHeight - 100);
        const left = 8 + Math.random() * maxX;
        const top = 8 + Math.random() * maxY;
        const btn = document.createElement("button");
        btn.className = "monster-btn";
        btn.style.left = left + "px";
        btn.style.top = top + "px";
        const img = document.createElement("img");
        img.className = "monster-img";
        img.src = monster.image;
        img.alt = monster.name;
        img.onerror = function() {
            this.remove();
            const fallback = document.createElement("div");
            fallback.className = "monster-fallback";
            fallback.textContent = monster.emoji;
            btn.appendChild(fallback);
        };
        const nameSpan = document.createElement("div");
        nameSpan.className = "monster-name";
        nameSpan.textContent = monster.name;
        btn.appendChild(img);
        btn.appendChild(nameSpan);
        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            catchMonster(monster.id, monster, btn, e);
        });
        gameArea.appendChild(btn);
        currentMonsters.push({ element: btn, monsterData: monster });
        setTimeout(() => {
            if (btn.parentNode) removeMonsterElement(btn);
        }, 42000);
    }

    function startSpawning() {
        if (spawnInterval) clearInterval(spawnInterval);
        spawnInterval = setInterval(() => {
            if (currentMonsters.length < 15) spawnRandomMonster();
        }, 2600);
    }

    function renderPokedex() {
        pokedexListDiv.innerHTML = "";
        for (let monster of MONSTERS) {
            const count = catchCounts[monster.id] || 0;
            const isCaught = count > 0;
            const card = document.createElement("div");
            card.className = "pokedex-card" + (isCaught ? "" : " uncaught");
            const avatarDiv = document.createElement("div");
            avatarDiv.className = "pokedex-avatar";
            if (isCaught) {
                const img = document.createElement("img");
                img.src = monster.image;
                img.alt = monster.name;
                img.onerror = () => {
                    avatarDiv.innerHTML = `<span style="font-size:2.5rem;">${monster.emoji}</span>`;
                };
                avatarDiv.appendChild(img);
            } else {
                const question = document.createElement("div");
                question.className = "question-mark";
                question.textContent = "?";
                avatarDiv.appendChild(question);
            }
            card.appendChild(avatarDiv);
            if (isCaught) {
                const nameSpan = document.createElement("div");
                nameSpan.className = "pokedex-name";
                nameSpan.textContent = monster.name;
                card.appendChild(nameSpan);
            } else {
                const undiscoveredSpan = document.createElement("div");
                undiscoveredSpan.className = "undiscovered-label";
                undiscoveredSpan.textContent = "未發現";
                card.appendChild(undiscoveredSpan);
            }
            if (isCaught) {
                card.addEventListener("click", () => {
                    showDetailModal(monster);
                });
            } else {
                card.addEventListener("click", () => alert(`❓ 你還沒遇過「${monster.name}」，繼續捕捉吧！`));
            }
            pokedexListDiv.appendChild(card);
        }
    }

    function showDetailModal(monster) {
        const count = catchCounts[monster.id] || 0;
        const modalDiv = document.createElement("div");
        modalDiv.style.position = "fixed";
        modalDiv.style.top = "0";
        modalDiv.style.left = "0";
        modalDiv.style.width = "100%";
        modalDiv.style.height = "100%";
        modalDiv.style.backgroundColor = "rgba(0,0,0,0.85)";
        modalDiv.style.display = "flex";
        modalDiv.style.alignItems = "center";
        modalDiv.style.justifyContent = "center";
        modalDiv.style.zIndex = "2000";
        modalDiv.style.backdropFilter = "blur(8px)";
        const card = document.createElement("div");
        card.style.backgroundColor = "#fff6e8";
        card.style.borderRadius = "56px";
        card.style.maxWidth = "340px";
        card.style.width = "80%";
        card.style.padding = "24px 20px 28px";
        card.style.textAlign = "center";
        card.innerHTML = `
            <div style="width:130px; height:130px; margin:0 auto 12px; background:#f3e5c9; display:flex; align-items:center; justify-content:center; border-radius:16px; padding:10px; cursor:pointer;" id="detailImgContainer">
                <img src="${monster.image}" style="max-width:100%; max-height:100%; object-fit:contain;">
            </div>
            <h3 style="color:#4f2d1a; margin:8px 0 8px;">${monster.name}</h3>
            <div style="background:#e6d5b3; display:inline-block; padding:4px 16px; border-radius:40px; margin-bottom:12px; font-weight:bold;">📊 捕捉次數：${count}</div>
            <p style="background:#f8efdb; border-radius:32px; padding:14px; line-height:1.45;">${monster.desc}</p>
            <button id="closeDetailBtn" style="background:#ac7349; border:none; color:white; padding:10px 24px; border-radius:40px; font-size:1rem; margin-top:18px;">關閉</button>
        `;
        modalDiv.appendChild(card);
        document.body.appendChild(modalDiv);
        
        const imgContainer = card.querySelector("#detailImgContainer");
        imgContainer.addEventListener("click", (e) => {
            e.stopPropagation();
            showZoomModal(monster.image);
        });
        
        const closeBtn = card.querySelector("#closeDetailBtn");
        const closeHandler = () => modalDiv.remove();
        closeBtn.addEventListener("click", closeHandler);
        modalDiv.addEventListener("click", (e) => { if (e.target === modalDiv) closeHandler(); });
    }

    function resetProgress() {
        if (confirm("⚠️ 重置會清除所有捕捉紀錄（包含次數），確定重新開始？")) {
            catchCounts = {};
            for (let monster of MONSTERS) {
                catchCounts[monster.id] = 0;
            }
            saveProgress();
            updateCatchCountUI();
            currentMonsters.forEach(m => m.element.remove());
            currentMonsters = [];
            alert("進度已重置！所有妖怪捕捉次數歸零。");
        }
    }

    function openPokedex() { renderPokedex(); modal.style.display = "flex"; }
    function closeModal() { modal.style.display = "none"; }

    function adjustBoundary() {
        if (!gameArea) return;
        const maxX = Math.max(70, gameArea.clientWidth - 100);
        const maxY = Math.max(70, gameArea.clientHeight - 100);
        for (let item of currentMonsters) {
            const btn = item.element;
            if (btn) {
                let left = parseFloat(btn.style.left);
                let top = parseFloat(btn.style.top);
                if (isNaN(left)) left = 10;
                if (isNaN(top)) top = 10;
                btn.style.left = Math.min(maxX, Math.max(5, left)) + "px";
                btn.style.top = Math.min(maxY, Math.max(5, top)) + "px";
            }
        }
    }
    window.addEventListener('resize', adjustBoundary);
    igBtn?.addEventListener("click", () => window.open("https://www.instagram.com/mongyao.2026/", "_blank"));
    openPokedexBtn.addEventListener("click", openPokedex);
    resetBtn.addEventListener("click", resetProgress);
    closeModalBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

    function init() { loadProgress(); startSpawning(); setTimeout(adjustBoundary, 100); }
    init();
</script>
</body>
</html>
